<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 高校自习室智能管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
        .admin-container { min-height: 100vh; }
        .admin-header { background: #001529; color: white; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 20px; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .admin-layout { display: flex; min-height: calc(100vh - 64px); }
        .admin-sidebar { width: 200px; background: #001529; min-height: calc(100vh - 64px); }
        .sidebar-menu { list-style: none; padding: 16px 0; }
        .sidebar-menu li { padding: 12px 24px; color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.3s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { color: white; background: #1890ff; }
        .admin-main { flex: 1; padding: 24px; }
        .page-title { font-size: 24px; margin-bottom: 24px; color: #1f2f3d; }
        .content-card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .search-bar { margin-bottom: 20px; display: flex; gap: 12px; }
        .pagination { margin-top: 20px; display: flex; justify-content: flex-end; }
    </style>
</head>
<body>
    <div id="app">
        <div class="admin-container">
            <header class="admin-header">
                <div class="logo">高校自习室智能管理系统</div>
                <div class="user-info">
                    <span th:text="${session.user?.realName ?: session.user?.username}">管理员</span>
                    <el-button type="danger" size="small" @click="logout">退出</el-button>
                </div>
            </header>
            <div class="admin-layout">
                <aside class="admin-sidebar">
                    <ul class="sidebar-menu">
                        <li @click="goTo('/sysadmin/dashboard')">控制台</li>
                        <li @click="goTo('/sysadmin/user')">用户管理</li>
                        <li @click="goTo('/sysadmin/studyroom')">自习室管理</li>
                        <li @click="goTo('/sysadmin/reservation')">预约管理</li>
                        <li class="active" @click="goTo('/sysadmin/notice')">公告管理</li>
                        <li @click="goTo('/sysadmin/forum')">论坛管理</li>
                        <li @click="goTo('/sysadmin/statistics')">数据统计</li>
                    </ul>
                </aside>
                <main class="admin-main">
                    <h1 class="page-title">公告管理</h1>
                    <div class="content-card">
                        <div class="search-bar">
                            <el-input v-model="searchForm.title" placeholder="公告标题" style="width: 200px;" clearable></el-input>
                            <el-select v-model="searchForm.status" placeholder="状态" style="width: 140px;" clearable>
                                <el-option label="草稿(待审核)" :value="0"></el-option>
                                <el-option label="一级审核通过" :value="1"></el-option>
                                <el-option label="已发布" :value="2"></el-option>
                                <el-option label="已关闭" :value="3"></el-option>
                                <el-option label="已屏蔽" :value="4"></el-option>
                            </el-select>
                            <el-button type="primary" @click="handleSearch">查询</el-button>
                            <el-button @click="resetSearch">重置</el-button>
                            <el-button type="success" @click="handleAdd">新建公告</el-button>
                        </div>
                        <el-table :data="noticeList" v-loading="loading" border>
                            <el-table-column prop="id" label="ID" width="60"></el-table-column>
                            <el-table-column prop="title" label="标题" min-width="200" show-overflow-tooltip></el-table-column>
                            <el-table-column prop="publisherName" label="发布人" width="120">
                                <template #default="scope">
                                    <span>{{scope.row.publisherName}}</span>
                                    <el-tag v-if="scope.row.publisherType === 2" size="small" type="warning" style="margin-left: 5px;">自习室管理员</el-tag>
                                    <el-tag v-else-if="scope.row.publisherType === 1" size="small" type="success" style="margin-left: 5px;">系统管理员</el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column prop="viewCount" label="浏览量" width="80"></el-table-column>
                            <el-table-column prop="isTop" label="置顶" width="80">
                                <template #default="scope">
                                    <el-tag v-if="scope.row.isTop === 1" type="danger">置顶</el-tag>
                                    <span v-else>--</span>
                                </template>
                            </el-table-column>
                            <el-table-column prop="status" label="状态" width="120">
                                <template #default="scope">
                                    <el-tag v-if="scope.row.status === 0" type="info">草稿(待审核)</el-tag>
                                    <el-tag v-else-if="scope.row.status === 1" type="warning">一级审核通过</el-tag>
                                    <el-tag v-else-if="scope.row.status === 2" type="success">已发布</el-tag>
                                    <el-tag v-else-if="scope.row.status === 3" type="info">已关闭</el-tag>
                                    <el-tag v-else-if="scope.row.status === 4" type="danger">已屏蔽</el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column prop="publishTime" label="发布时间" width="160"></el-table-column>
                            <el-table-column label="操作" width="320" fixed="right">
                                <template #default="scope">
                                    <el-button type="primary" size="small" @click="handleView(scope.row)">查看</el-button>
                                    <el-button v-if="scope.row.status === 0" type="success" size="small" @click="handleAudit1(scope.row)">通过</el-button>
                                    <el-button v-if="scope.row.status === 1" type="success" size="small" @click="handlePublish(scope.row)">发布</el-button>
                                    <el-button v-if="scope.row.status === 0 || scope.row.status === 1 || scope.row.status === 2" type="warning" size="small" @click="handleClose(scope.row)">关闭</el-button>
                                    <el-button v-if="scope.row.status !== 4" type="danger" size="small" @click="handleBlock(scope.row)">屏蔽</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                        <div class="pagination">
                            <el-pagination v-model:current-page="page.current" v-model:page-size="page.size" :total="page.total" :page-sizes="[10, 20, 50]" layout="total, sizes, prev, pager, next" @size-change="handleSizeChange" @current-change="handleCurrentChange"></el-pagination>
                        </div>
                    </div>
                </main>
            </div>
        </div>
        <el-dialog v-model="dialogVisible" :title="isEdit ? '编辑公告' : '新建公告'" width="600px">
            <el-form :model="form" :rules="rules" ref="formRef" label-width="80px">
                <el-form-item label="标题" prop="title">
                    <el-input v-model="form.title" placeholder="请输入公告标题" maxlength="100" show-word-limit></el-input>
                </el-form-item>
                <el-form-item label="内容" prop="content">
                    <el-input v-model="form.content" type="textarea" :rows="8" placeholder="请输入公告内容" maxlength="2000" show-word-limit></el-input>
                </el-form-item>
                <el-form-item label="置顶">
                    <el-switch v-model="form.isTop" :active-value="1" :inactive-value="0" active-text="置顶"></el-switch>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="dialogVisible = false">取消</el-button>
                <el-button type="primary" @click="handleSave">保存</el-button>
            </template>
        </el-dialog>

        <!-- 查看公告详情弹窗 -->
        <el-dialog v-model="viewDialogVisible" title="公告详情" width="600px">
            <div v-if="currentNotice">
                <h3 style="margin-bottom: 16px;">{{currentNotice.title}}</h3>
                <div style="color: #666; margin-bottom: 16px;">
                    <span>发布人：{{currentNotice.publisherName}}</span>
                    <span style="margin-left: 20px;">发布时间：{{currentNotice.publishTime}}</span>
                </div>
                <div style="line-height: 1.8; white-space: pre-wrap;">{{currentNotice.content}}</div>
                <div style="margin-top: 20px;">
                    <el-tag v-if="currentNotice.isTop === 1" type="danger">置顶</el-tag>
                    <el-tag v-if="currentNotice.status === 0" type="info">草稿(待审核)</el-tag>
                    <el-tag v-else-if="currentNotice.status === 1" type="warning">一级审核通过</el-tag>
                    <el-tag v-else-if="currentNotice.status === 2" type="success">已发布</el-tag>
                    <el-tag v-else-if="currentNotice.status === 3" type="info">已关闭</el-tag>
                    <el-tag v-else-if="currentNotice.status === 4" type="danger">已屏蔽</el-tag>
                </div>
            </div>
        </el-dialog>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        const { ElMessage, ElMessageBox } = ElementPlus;
        createApp({
            setup() {
                const loading = ref(false);
                const noticeList = ref([]);
                const dialogVisible = ref(false);
                const viewDialogVisible = ref(false);
                const currentNotice = ref(null);
                const isEdit = ref(false);
                const formRef = ref(null);
                const form = reactive({ id: null, title: '', content: '', isTop: 0 });
                const rules = {
                    title: [{ required: true, message: '请输入标题', trigger: 'blur' }],
                    content: [{ required: true, message: '请输入内容', trigger: 'blur' }]
                };
                const searchForm = reactive({ title: '', status: null });
                const page = reactive({ current: 1, size: 10, total: 0 });
                const fetchList = async () => {
                    loading.value = true;
                    try {
                        const params = { page: page.current, size: page.size, ...searchForm };
                        const res = await axios.get('/sysadmin/notice/list', { params });
                        if (res.data.code === 200) { noticeList.value = res.data.data.records; page.total = res.data.data.total; }
                    } catch (e) { ElMessage.error('获取列表失败'); }
                    finally { loading.value = false; }
                };
                const handleSearch = () => { page.current = 1; fetchList(); };
                const resetSearch = () => { searchForm.title = ''; searchForm.status = null; handleSearch(); };
                const handleAdd = () => { isEdit.value = false; form.id = null; form.title = ''; form.content = ''; form.isTop = 0; dialogVisible.value = true; };
                const handleView = (row) => { currentNotice.value = row; viewDialogVisible.value = true; };
                const handleSave = async () => {
                    try {
                        await formRef.value.validate();
                        const url = isEdit.value ? `/sysadmin/notice/${form.id}` : '/sysadmin/notice';
                        const method = isEdit.value ? 'put' : 'post';
                        const res = await axios[method](url, { ...form, status: 0 });
                        if (res.data.code === 200) { ElMessage.success('保存成功'); dialogVisible.value = false; fetchList(); }
                        else ElMessage.error(res.data.message || '保存失败');
                    } catch (e) { if (e !== 'cancel') ElMessage.error('保存失败'); }
                };
                const handleAudit1 = async (row) => {
                    try {
                        await ElMessageBox.confirm('确定一级审核通过该公告?', '提示', { type: 'warning' });
                        const res = await axios.put(`/sysadmin/notice/${row.id}/audit1`);
                        if (res.data.code === 200) { ElMessage.success('一级审核通过'); fetchList(); }
                        else ElMessage.error(res.data.message || '审核失败');
                    } catch (e) { if (e !== 'cancel') ElMessage.error('审核失败'); }
                };
                const handlePublish = async (row) => {
                    try {
                        await ElMessageBox.confirm('确定发布该公告?', '提示', { type: 'warning' });
                        const res = await axios.put(`/sysadmin/notice/${row.id}/publish`);
                        if (res.data.code === 200) { ElMessage.success('发布成功'); fetchList(); }
                        else ElMessage.error(res.data.message || '发布失败');
                    } catch (e) { if (e !== 'cancel') ElMessage.error('发布失败'); }
                };
                const handleClose = async (row) => {
                    try {
                        await ElMessageBox.confirm('确定关闭该公告?', '提示', { type: 'warning' });
                        const res = await axios.put(`/sysadmin/notice/${row.id}/close`);
                        if (res.data.code === 200) { ElMessage.success('关闭成功'); fetchList(); }
                        else ElMessage.error(res.data.message || '关闭失败');
                    } catch (e) { if (e !== 'cancel') ElMessage.error('关闭失败'); }
                };
                const handleBlock = async (row) => {
                    try {
                        await ElMessageBox.confirm('确定屏蔽该公告?屏蔽后用户将无法看到该公告。', '警告', { type: 'warning' });
                        const res = await axios.put(`/sysadmin/notice/${row.id}/block`);
                        if (res.data.code === 200) { ElMessage.success('屏蔽成功'); fetchList(); }
                        else ElMessage.error(res.data.message || '屏蔽失败');
                    } catch (e) { if (e !== 'cancel') ElMessage.error('屏蔽失败'); }
                };
                const handleSizeChange = (val) => { page.size = val; fetchList(); };
                const handleCurrentChange = (val) => { page.current = val; fetchList(); };
                const goTo = (path) => { window.location.href = path; };
                const logout = async () => { try { await axios.post('/auth/logout'); window.location.href = '/login'; } catch (e) {} };
                onMounted(() => { fetchList(); });
                return { loading, noticeList, dialogVisible, viewDialogVisible, currentNotice, isEdit, formRef, form, rules, searchForm, page, handleSearch, resetSearch, handleAdd, handleView, handleSave, handleAudit1, handlePublish, handleClose, handleBlock, handleSizeChange, handleCurrentChange, goTo, logout };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
