<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 高校自习室智能管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; }
        .register-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0068DD 0%, #0050B3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container { width: 100%; max-width: 420px; }
        .register-box {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .register-header { text-align: center; margin-bottom: 32px; }
        .register-header h1 { font-size: 28px; color: #1a1a1a; margin-bottom: 8px; }
        .register-header p { color: #666; font-size: 14px; }
        .register-form { margin-top: 24px; }
        .form-item { margin-bottom: 20px; }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .form-item input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-item input:focus {
            outline: none;
            border-color: #0068DD;
            box-shadow: 0 0 0 3px rgba(0, 104, 221, 0.1);
        }
        .register-btn {
            width: 100%;
            padding: 14px;
            background: #0068DD;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .register-btn:hover { background: #0050B3; }
        .register-btn:disabled { background: #ccc; cursor: not-allowed; }
        .login-link {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 14px;
        }
        .login-link a { color: #0068DD; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .error-msg { color: #f56c6c; font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="register-page">
            <div class="register-container">
                <div class="register-box">
                    <div class="register-header">
                        <h1>用户注册</h1>
                        <p>创建您的自习室管理系统账号</p>
                    </div>
                    
                    <form class="register-form" @submit.prevent="handleRegister">
                        <div class="form-item">
                            <label>用户名 *</label>
                            <input 
                                v-model="form.username" 
                                type="text" 
                                placeholder="请输入用户名"
                                required
                            >
                        </div>
                        
                        <div class="form-item">
                            <label>密码 *</label>
                            <input 
                                v-model="form.password" 
                                type="password" 
                                placeholder="请输入密码"
                                required
                            >
                        </div>
                        
                        <div class="form-item">
                            <label>确认密码 *</label>
                            <input 
                                v-model="form.confirmPassword" 
                                type="password" 
                                placeholder="请再次输入密码"
                                required
                            >
                        </div>
                        
                        <div class="form-item">
                            <label>真实姓名 *</label>
                            <input 
                                v-model="form.realName" 
                                type="text" 
                                placeholder="请输入真实姓名"
                                required
                            >
                        </div>
                        
                        <div class="form-item">
                            <label>手机号 *</label>
                            <input
                                v-model="form.phone"
                                type="tel"
                                placeholder="请输入手机号"
                                required
                            >
                        </div>

                        <div class="form-item">
                            <label>邮箱 *</label>
                            <input
                                v-model="form.email"
                                type="email"
                                placeholder="请输入邮箱"
                                required
                            >
                        </div>
                        
                        <div v-if="errorMsg" class="error-msg">{{errorMsg}}</div>
                        
                        <button type="submit" class="register-btn" :disabled="loading">
                            {{loading ? '注册中...' : '注册'}}
                        </button>
                    </form>
                    
                    <div class="login-link">
                        已有账号？<a href="/login">立即登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive } = Vue;
        const { ElMessage } = ElementPlus;

        createApp({
            setup() {
                const form = reactive({
                    username: '',
                    password: '',
                    confirmPassword: '',
                    realName: '',
                    phone: '',
                    email: ''
                });
                const loading = ref(false);
                const errorMsg = ref('');

                const handleRegister = async () => {
                    errorMsg.value = '';
                    
                    // 表单验证
                    if (!form.username || !form.password || !form.confirmPassword || !form.realName) {
                        errorMsg.value = '请填写必填项';
                        return;
                    }

                    if (!form.phone) {
                        errorMsg.value = '请填写手机号';
                        return;
                    }

                    if (!form.email) {
                        errorMsg.value = '请填写邮箱';
                        return;
                    }
                    
                    if (form.password !== form.confirmPassword) {
                        errorMsg.value = '两次输入的密码不一致';
                        return;
                    }
                    
                    if (form.password.length < 6) {
                        errorMsg.value = '密码长度不能少于6位';
                        return;
                    }
                    
                    loading.value = true;
                    try {
                        const res = await axios.post('/auth/register', {
                            username: form.username,
                            password: form.password,
                            realName: form.realName,
                            phone: form.phone,
                            email: form.email
                        });
                        
                        if (res.data.code === 200) {
                            ElMessage.success('注册成功，请登录');
                            setTimeout(() => {
                                window.location.href = '/login';
                            }, 1500);
                        } else {
                            errorMsg.value = res.data.message || '注册失败';
                        }
                    } catch (e) {
                        errorMsg.value = e.response?.data?.message || '注册失败，请稍后重试';
                    } finally {
                        loading.value = false;
                    }
                };

                return { form, loading, errorMsg, handleRegister };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
