<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 高校自习室智能管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
        }

        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #0068DD 0%, #0050B3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #132842;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #595959;
            font-size: 16px;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: #595959;
            font-size: 14px;
        }

        .login-footer a {
            color: #0068DD;
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .forgot-link-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
    </style>
</head>
<body>
<div id="app" class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>高校自习室智能管理系统</h1>
                <p>欢迎登录</p>
            </div>

            <el-alert
                    v-if="errorMsg"
                    :title="errorMsg"
                    type="error"
                    show-icon
                    closable
                    @close="errorMsg = ''"
                    style="margin-bottom: 20px;">
            </el-alert>

            <el-form
                    :model="loginForm"
                    :rules="rules"
                    ref="loginFormRef"
                    @keyup.enter="handleLogin">

                <el-form-item prop="username">
                    <el-input
                            v-model="loginForm.username"
                            placeholder="请输入用户名"
                            size="large"
                            :prefix-icon="User"
                            clearable>
                    </el-input>
                </el-form-item>

                <el-form-item prop="password">
                    <el-input
                            v-model="loginForm.password"
                            type="password"
                            placeholder="请输入密码"
                            size="large"
                            :prefix-icon="Lock"
                            show-password
                            clearable>
                    </el-input>
                </el-form-item>

                <el-form-item>
                    <div class="forgot-link-container">
                        <el-checkbox v-model="loginForm.rememberMe">记住密码</el-checkbox>
                        <el-link type="primary" :underline="false" @click="showForgotDialog = true">忘记密码？</el-link>
                    </div>
                </el-form-item>

                <el-form-item>
                    <el-button
                            type="primary"
                            size="large"
                            style="width: 100%; height: 48px; font-size: 16px; font-weight: 600; border-radius: 8px;"
                            :loading="loading"
                            @click="handleLogin">
                        登 录
                    </el-button>
                </el-form-item>
            </el-form>

            <div class="login-footer">
                <span>还没有账号？</span>
                <a th:href="@{/register}">立即注册</a>
            </div>
        </div>
    </div>

    <el-dialog v-model="showForgotDialog" title="找回密码" width="400px" @close="resetForgotForm" destroy-on-close>
        <el-steps :active="forgotStep" finish-status="success" simple style="margin-bottom: 20px">
            <el-step title="验证身份" />
            <el-step title="重置密码" />
        </el-steps>

        <el-form v-if="forgotStep === 0" :model="forgotForm" :rules="forgotRules" ref="forgotFormRef" label-position="top">
            <el-form-item label="用户名" prop="username">
                <el-input v-model="forgotForm.username" placeholder="请输入您的用户名"></el-input>
            </el-form-item>
            <el-form-item label="绑定邮箱" prop="email">
                <el-input v-model="forgotForm.email" placeholder="请输入注册时填写的邮箱"></el-input>
            </el-form-item>
            <el-form-item label="手机号" prop="phone">
                <el-input v-model="forgotForm.phone" placeholder="请输入注册时填写的手机号"></el-input>
            </el-form-item>
        </el-form>

        <el-form v-if="forgotStep === 1" :model="pwdForm" :rules="pwdRules" ref="pwdFormRef" label-position="top">
            <el-form-item label="新密码" prop="newPassword">
                <el-input v-model="pwdForm.newPassword" type="password" show-password placeholder="请输入新密码"></el-input>
            </el-form-item>
            <el-form-item label="确认新密码" prop="confirmPassword">
                <el-input v-model="pwdForm.confirmPassword" type="password" show-password placeholder="请再次输入新密码"></el-input>
            </el-form-item>
        </el-form>

        <template #footer>
                <span class="dialog-footer">
                    <el-button @click="showForgotDialog = false">取 消</el-button>
                    <el-button type="primary" v-if="forgotStep === 0" @click="handleVerify" :loading="verifying">下一步</el-button>
                    <el-button type="primary" v-if="forgotStep === 1" @click="handleReset" :loading="resetting">确 定</el-button>
                </span>
        </template>
    </el-dialog>
</div>

<script>
    const { createApp, ref, reactive } = Vue;
    const { ElMessage } = ElementPlus;
    const { User, Lock } = ElementPlusIconsVue;

    createApp({
        setup() {
            // 登录逻辑相关
            const loginFormRef = ref(null);
            const loading = ref(false);
            const errorMsg = ref('');

            const loginForm = reactive({
                username: '',
                password: '',
                rememberMe: false
            });

            const rules = {
                username: [
                    { required: true, message: '请输入用户名', trigger: 'blur' },
                    { min: 3, max: 20, message: '长度在 3 到 20 个字符', trigger: 'blur' }
                ],
                password: [
                    { required: true, message: '请输入密码', trigger: 'blur' },
                    { min: 4, max: 20, message: '长度在 4 到 20 个字符', trigger: 'blur' }
                ]
            };

            // 忘记密码逻辑相关
            const showForgotDialog = ref(false);
            const forgotStep = ref(0);
            const forgotFormRef = ref(null);
            const pwdFormRef = ref(null);
            const verifying = ref(false);
            const resetting = ref(false);

            const forgotForm = reactive({
                username: '',
                email: '',
                phone: ''
            });

            const pwdForm = reactive({
                newPassword: '',
                confirmPassword: ''
            });

            const validateConfirmPwd = (rule, value, callback) => {
                if (value !== pwdForm.newPassword) {
                    callback(new Error('两次输入的密码不一致'));
                } else {
                    callback();
                }
            };

            const forgotRules = {
                username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                email: [
                    { required: true, message: '请输入邮箱', trigger: 'blur' },
                    { type: 'email', message: '请输入正确的邮箱格式', trigger: ['blur', 'change'] }
                ],
                phone: [{ required: true, message: '请输入手机号', trigger: 'blur' }]
            };

            const pwdRules = {
                newPassword: [
                    { required: true, message: '请输入新密码', trigger: 'blur' },
                    { min: 4, max: 20, message: '长度在 4 到 20 个字符', trigger: 'blur' }
                ],
                confirmPassword: [
                    { required: true, message: '请确认新密码', trigger: 'blur' },
                    { validator: validateConfirmPwd, trigger: 'blur' }
                ]
            };

            // 执行登录
            const handleLogin = async () => {
                if (!loginFormRef.value) return;
                await loginFormRef.value.validate((valid) => {
                    if (valid) {
                        doLogin();
                    }
                });
            };

            const doLogin = async () => {
                loading.value = true;
                errorMsg.value = '';
                try {
                    const response = await axios.post('/auth/login', {
                        username: loginForm.username,
                        password: loginForm.password
                    });

                    if (response.data.code === 200) {
                        ElMessage.success('登录成功');
                        const token = response.data.data.token;
                        document.cookie = `token=${token}; path=/`;

                        const roles = response.data.data.roles;
                        if (roles.includes('ROLE_SYS_ADMIN')) {
                            window.location.href = '/sysadmin/dashboard';
                        } else if (roles.includes('ROLE_ROOM_ADMIN')) {
                            window.location.href = '/admin/dashboard';
                        } else {
                            window.location.href = '/home';
                        }
                    } else {
                        errorMsg.value = response.data.message || '登录失败';
                    }
                } catch (error) {
                    errorMsg.value = error.response?.data?.message || '服务器连接失败';
                } finally {
                    loading.value = false;
                }
            };

            // 身份验证逻辑
            const handleVerify = async () => {
                if (!forgotFormRef.value) return;
                await forgotFormRef.value.validate(async (valid) => {
                    if (valid) {
                        verifying.value = true;
                        try {
                            const res = await axios.post('/auth/verify-identity', forgotForm);
                            if (res.data.code === 200) {
                                ElMessage.success('验证成功');
                                forgotStep.value = 1;
                            } else {
                                ElMessage.error(res.data.message);
                            }
                        } catch (error) {
                            ElMessage.error(error.response?.data?.message || '验证未通过，请检查填写信息');
                        } finally {
                            verifying.value = false;
                        }
                    }
                });
            };

            // 提交重置密码
            const handleReset = async () => {
                if (!pwdFormRef.value) return;
                await pwdFormRef.value.validate(async (valid) => {
                    if (valid) {
                        resetting.value = true;
                        try {
                            const res = await axios.post('/auth/reset-password', {
                                username: forgotForm.username,
                                newPassword: pwdForm.newPassword
                            });
                            if (res.data.code === 200) {
                                ElMessage.success('密码重置成功，请使用新密码登录');
                                showForgotDialog.value = false;
                            } else {
                                ElMessage.error(res.data.message);
                            }
                        } catch (error) {
                            ElMessage.error(error.response?.data?.message || '重置失败，请稍后再试');
                        } finally {
                            resetting.value = false;
                        }
                    }
                });
            };

            const resetForgotForm = () => {
                forgotStep.value = 0;
                if (forgotFormRef.value) forgotFormRef.value.resetFields();
                if (pwdFormRef.value) pwdFormRef.value.resetFields();
            };

            return {
                // 登录相关
                loginForm, loginFormRef, rules, loading, errorMsg, handleLogin, User, Lock,
                // 忘记密码相关
                showForgotDialog, forgotStep, forgotForm, pwdForm, forgotRules, pwdRules,
                forgotFormRef, pwdFormRef, verifying, resetting,
                handleVerify, handleReset, resetForgotForm
            };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
