<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告查看 - 高校自习室智能管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
        .admin-container { min-height: 100vh; }
        .admin-header { background: #001529; color: white; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 20px; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .admin-layout { display: flex; min-height: calc(100vh - 64px); }
        .admin-sidebar { width: 200px; background: #001529; min-height: calc(100vh - 64px); }
        .sidebar-menu { list-style: none; padding: 16px 0; }
        .sidebar-menu li { padding: 12px 24px; color: rgba(255,255,255,0.65); cursor: pointer; transition: all 0.3s; }
        .sidebar-menu li:hover, .sidebar-menu li.active { color: white; background: #1890ff; }
        .admin-main { flex: 1; padding: 24px; }
        .page-title { font-size: 24px; margin-bottom: 24px; color: #1f2f3d; }
        .content-card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .search-bar { margin-bottom: 20px; display: flex; gap: 12px; }
        .pagination { margin-top: 20px; display: flex; justify-content: flex-end; }
        .info-tip { background: #fff7e6; border: 1px solid #ffd591; padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; color: #d46b08; font-size: 14px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="admin-container">
            <header class="admin-header">
                <div class="logo">自习室管理后台</div>
                <div class="user-info">
                    <span th:text="${session.user?.realName ?: session.user?.username}">管理员</span>
                    <el-button type="danger" size="small" @click="logout">退出</el-button>
                </div>
            </header>
            <div class="admin-layout">
                <aside class="admin-sidebar">
                    <ul class="sidebar-menu">
                        <li @click="goTo('/admin/dashboard')">控制台</li>
                        <li @click="goTo('/admin/studyroom')">自习室管理</li>
                        <li @click="goTo('/admin/reservation')">预约管理</li>
                        <li @click="goTo('/admin/checkin')">出勤管理</li>
                        <li @click="goTo('/admin/forum')">论坛管理</li>
                        <li class="active" @click="goTo('/admin/notice')">公告查看</li>
                        <li @click="goTo('/admin/profile')">个人中心</li>
                    </ul>
                </aside>
                <main class="admin-main">
                    <h1 class="page-title">系统公告</h1>
                    <div class="content-card">
                        <div class="info-tip">
                            ⚠️ 公告只能由系统管理员发布。如有需要，请通过论坛帖子向系统管理员反映，或联系系统管理员代为发布。
                        </div>
                        <div class="search-bar">
                            <el-input v-model="searchTitle" placeholder="公告标题" style="width: 200px;" clearable @keyup.enter="handleSearch"></el-input>
                            <el-button type="primary" @click="handleSearch">查询</el-button>
                            <el-button @click="resetSearch">重置</el-button>
                        </div>
                        <el-table :data="noticeList" v-loading="loading" border>
                            <el-table-column prop="id" label="ID" width="60"></el-table-column>
                            <el-table-column prop="title" label="标题" min-width="200" show-overflow-tooltip></el-table-column>
                            <el-table-column prop="publisherName" label="发布人" width="100"></el-table-column>
                            <el-table-column prop="isTop" label="置顶" width="70">
                                <template #default="scope">
                                    <el-tag v-if="scope.row.isTop === 1" type="danger" size="small">置顶</el-tag>
                                    <span v-else>--</span>
                                </template>
                            </el-table-column>
                            <el-table-column prop="viewCount" label="浏览量" width="80"></el-table-column>
                            <el-table-column prop="publishTime" label="发布时间" width="160"></el-table-column>
                            <el-table-column label="操作" width="100" fixed="right">
                                <template #default="scope">
                                    <el-button type="primary" size="small" plain @click="handleView(scope.row)">查看</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                        <div class="pagination">
                            <el-pagination v-model:current-page="page.current" v-model:page-size="page.size" :total="page.total" :page-sizes="[10, 20, 50]" layout="total, sizes, prev, pager, next" @size-change="handleSizeChange" @current-change="handleCurrentChange"></el-pagination>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- 查看公告详情弹窗 -->
        <el-dialog v-model="viewDialogVisible" title="公告详情" width="600px">
            <div v-if="currentNotice">
                <h3 style="margin-bottom: 16px;">
                    <el-tag v-if="currentNotice.isTop === 1" type="danger" size="small" style="margin-right: 8px;">置顶</el-tag>
                    {{currentNotice.title}}
                </h3>
                <div style="color: #999; font-size: 13px; margin-bottom: 16px;">
                    发布人：{{currentNotice.publisherName}} &nbsp;|&nbsp; 发布时间：{{currentNotice.publishTime || currentNotice.createTime}}
                </div>
                <div style="line-height: 1.8; white-space: pre-wrap; padding: 16px; background: #f9f9f9; border-radius: 6px;">{{currentNotice.content}}</div>
            </div>
        </el-dialog>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        const { ElMessage } = ElementPlus;
        createApp({
            setup() {
                const loading = ref(false);
                const noticeList = ref([]);
                const searchTitle = ref('');
                const viewDialogVisible = ref(false);
                const currentNotice = ref(null);
                const page = reactive({ current: 1, size: 10, total: 0 });

                const fetchList = async () => {
                    loading.value = true;
                    try {
                        const params = { page: page.current, size: page.size, status: 2 };
                        if (searchTitle.value) params.title = searchTitle.value;
                        const res = await axios.get('/sysadmin/notice/list', { params });
                        if (res.data.code === 200) {
                            noticeList.value = res.data.data.records;
                            page.total = res.data.data.total;
                        }
                    } catch (e) { ElMessage.error('获取公告失败'); }
                    finally { loading.value = false; }
                };

                const handleSearch = () => { page.current = 1; fetchList(); };
                const resetSearch = () => { searchTitle.value = ''; handleSearch(); };
                const handleView = (row) => { currentNotice.value = row; viewDialogVisible.value = true; };
                const handleSizeChange = (val) => { page.size = val; fetchList(); };
                const handleCurrentChange = (val) => { page.current = val; fetchList(); };
                const goTo = (path) => { window.location.href = path; };
                const logout = async () => { try { await axios.post('/auth/logout'); window.location.href = '/login'; } catch (e) {} };

                onMounted(() => { fetchList(); });

                return { loading, noticeList, searchTitle, viewDialogVisible, currentNotice, page,
                    handleSearch, resetSearch, handleView, handleSizeChange, handleCurrentChange, goTo, logout };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
