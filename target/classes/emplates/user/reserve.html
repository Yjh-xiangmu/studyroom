<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约座位 - 高校自习室智能管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .navbar { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 0 48px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .navbar-brand { font-size: 22px; font-weight: 700; color: #0068DD; text-decoration: none; }
        .nav-menu { display: flex; gap: 32px; }
        .nav-item { color: #333; text-decoration: none; font-weight: 500; line-height: 64px; }
        .nav-item:hover, .nav-item.active { color: #0068DD; }
        .main-content { padding-top: 64px; min-height: 100vh; padding-bottom: 40px; }
        .reserve-container { max-width: 700px; margin: 40px auto; padding: 0 24px; }
        .reserve-card { background: #fff; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .reserve-title { font-size: 24px; font-weight: 600; margin-bottom: 24px; text-align: center; }
        .info-item { display: flex; margin-bottom: 16px; padding: 12px; background: #f5f7fa; border-radius: 4px; }
        .info-label { color: #666; width: 100px; }
        .info-value { font-weight: 500; flex: 1; }
        .occupied-times { margin: 20px 0; padding: 16px; background: #fff2f0; border: 1px solid #ffccc7; border-radius: 4px; }
        .occupied-times-title { color: #ff4d4f; font-weight: 500; margin-bottom: 12px; }
        .time-tag { margin: 4px; }
        .time-slot-visual { display: flex; height: 40px; background: #f0f0f0; border-radius: 4px; margin: 16px 0; overflow: hidden; }
        .time-slot-free { flex: 1; background: #52c41a; }
        .time-slot-occupied { flex: 1; background: #ff4d4f; }
        .time-slot-my { flex: 1; background: #1890ff; }
        .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <a href="/" class="navbar-brand">自习室管理系统</a>
            <div class="nav-menu">
                <a href="/" class="nav-item">首页</a>
                <a href="/studyroom" class="nav-item active">自习室</a>
                <a href="/reservation" class="nav-item">我的预约</a>
                <a href="/checkin" class="nav-item">签到打卡</a>
                <a href="/forum" class="nav-item">社区论坛</a>
            </div>
            <div class="nav-user">
                <el-dropdown v-if="currentUser">
                    <span class="el-dropdown-link">
                        <el-avatar :size="32" :icon="UserFilled"></el-avatar>
                        <span style="margin-left: 8px;">{{currentUser.realName || currentUser.username}}</span>
                    </span>
                    <template #dropdown>
                        <el-dropdown-menu>
                            <el-dropdown-item><a href="/profile" style="text-decoration: none; color: inherit;">个人中心</a></el-dropdown-item>
                            <el-dropdown-item divided @click="logout">退出登录</el-dropdown-item>
                        </el-dropdown-menu>
                    </template>
                </el-dropdown>
                <a v-else href="/login" style="color: #333; text-decoration: none;">登录</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="reserve-container">
                <div class="reserve-card">
                    <div class="reserve-title">确认预约信息</div>
                    <div class="info-item">
                        <span class="info-label">自习室</span>
                        <span class="info-value">{{room.name}}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">座位号</span>
                        <span class="info-value">{{seat.seatNumber}}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">位置</span>
                        <span class="info-value">{{room.building}} {{room.floor}}层</span>
                    </div>
                    
                    <el-form :model="form" label-width="100px" style="margin-top: 24px;">
                        <el-form-item label="预约日期">
                            <el-date-picker 
                                v-model="form.date" 
                                type="date" 
                                placeholder="选择日期" 
                                :disabled-date="disabledDate" 
                                @change="onDateChange"
                                style="width: 100%;"></el-date-picker>
                        </el-form-item>
                        
                        <!-- 已预约时段显示 -->
                        <div v-if="occupiedTimes.length > 0" class="occupied-times">
                            <div class="occupied-times-title">⚠️ 该座位已被预约的时段：</div>
                            <div>
                                <el-tag v-for="time in occupiedTimes" :key="time.startTime" type="danger" class="time-tag">
                                    {{time.startTime}} - {{time.endTime}}
                                </el-tag>
                            </div>
                        </div>
                        <div v-else-if="form.date" class="occupied-times" style="background: #f6ffed; border-color: #b7eb8f;">
                            <div style="color: #52c41a;">✅ 该座位当前日期暂无预约</div>
                        </div>
                        
                        <el-form-item label="开始时间">
                            <el-time-select 
                                v-model="form.startTime" 
                                :min-time="minStartTime"
                                start="08:00" 
                                step="00:30" 
                                end="22:00" 
                                placeholder="选择时间" 
                                @change="onStartTimeChange"
                                style="width: 100%;"></el-time-select>
                        </el-form-item>
                        <el-form-item label="结束时间">
                            <el-time-select 
                                v-model="form.endTime" 
                                :min-time="minEndTime"
                                start="08:00" 
                                step="00:30" 
                                end="22:00" 
                                placeholder="选择时间" 
                                style="width: 100%;"></el-time-select>
                        </el-form-item>
                    </el-form>
                    
                    <div style="margin-top: 24px; text-align: center;">
                        <el-button @click="goBack">返回</el-button>
                        <el-button type="primary" @click="submitReserve" :loading="submitting">确认预约</el-button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="none">
        const { createApp, ref, reactive, onMounted, computed, watch } = Vue;
        const { ElMessage } = ElementPlus;
        const { UserFilled } = ElementPlusIconsVue;

        createApp({
            setup() {
                const currentUser = ref(null);
                const room = ref({});
                const seat = ref({});
                const submitting = ref(false);
                const form = reactive({ date: '', startTime: '', endTime: '' });
                const occupiedTimes = ref([]);

                const fetchUser = async () => {
                    try {
                        const res = await axios.get('/api/user/info');
                        if (res.data.code === 200) currentUser.value = res.data.data;
                    } catch (e) {}
                };

                const disabledDate = (time) => {
                    // 不能选择今天之前的日期
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    return time.getTime() < today.getTime();
                };
                
                // 最小开始时间（当前时间之后）
                const minStartTime = computed(() => {
                    if (!form.date) return '';
                    const selectedDate = new Date(form.date);
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    
                    // 如果是今天，则最小时间为当前时间
                    if (selectedDate.getTime() === today.getTime()) {
                        const now = new Date();
                        const hours = now.getHours().toString().padStart(2, '0');
                        const minutes = now.getMinutes().toString().padStart(2, '0');
                        return `${hours}:${minutes}`;
                    }
                    return '';
                });
                
                // 最小结束时间
                const minEndTime = computed(() => {
                    if (!form.startTime) return '';
                    // 结束时间必须晚于开始时间
                    return form.startTime;
                });

                const goBack = () => {
                    window.history.back();
                };
                
                // 日期变化时查询已预约时段
                const onDateChange = async () => {
                    if (!form.date || !seat.value.id) return;
                    
                    try {
                        const dateStr = form.date.toISOString ? form.date.toISOString().split('T')[0] : form.date;
                        const res = await axios.get(`/api/reservation/seat/${seat.value.id}/occupied-times?date=${dateStr}`);
                        if (res.data.code === 200) {
                            occupiedTimes.value = res.data.data;
                        }
                    } catch (e) {
                        console.error('获取已预约时段失败', e);
                    }
                };
                
                // 开始时间变化时，如果结束时间早于开始时间，清空结束时间
                const onStartTimeChange = () => {
                    if (form.endTime && form.startTime >= form.endTime) {
                        form.endTime = '';
                    }
                };

                const submitReserve = async () => {
                    if (!form.date || !form.startTime || !form.endTime) {
                        ElMessage.warning('请填写完整的预约信息');
                        return;
                    }
                    if (form.startTime >= form.endTime) {
                        ElMessage.warning('结束时间必须晚于开始时间');
                        return;
                    }
                    
                    // 检查是否与已预约时段冲突
                    for (const occupied of occupiedTimes.value) {
                        if (isTimeOverlap(form.startTime, form.endTime, occupied.startTime, occupied.endTime)) {
                            ElMessage.error(`该时间段与已预约时段 ${occupied.startTime}-${occupied.endTime} 冲突，请选择其他时段`);
                            return;
                        }
                    }
                    
                    submitting.value = true;
                    try {
                        const params = {
                            roomId: room.value.id,
                            seatId: seat.value.id,
                            reservationDate: form.date.toISOString ? form.date.toISOString().split('T')[0] : form.date,
                            startTime: form.startTime,
                            endTime: form.endTime
                        };
                        const res = await axios.post('/api/reservation/create', params);
                        if (res.data.code === 200) {
                            ElMessage.success('预约成功');
                            window.location.href = '/reservation';
                        } else {
                            ElMessage.error(res.data.message || '预约失败');
                        }
                    } catch (e) {
                        if (e.response && e.response.data && e.response.data.message) {
                            ElMessage.error(e.response.data.message);
                        } else {
                            ElMessage.error('预约失败，请重试');
                        }
                    } finally {
                        submitting.value = false;
                    }
                };
                
                // 检查时间是否重叠
                const isTimeOverlap = (start1, end1, start2, end2) => {
                    // 转换为分钟数比较
                    const toMinutes = (time) => {
                        const [h, m] = time.split(':').map(Number);
                        return h * 60 + m;
                    };
                    const s1 = toMinutes(start1);
                    const e1 = toMinutes(end1);
                    const s2 = toMinutes(start2);
                    const e2 = toMinutes(end2);
                    
                    // 有重叠
                    return !(e1 <= s2 || s1 >= e2);
                };

                const logout = async () => { try { await axios.post('/auth/logout'); window.location.href = '/login'; } catch (e) {} };

                onMounted(() => {
                    fetchUser();
                    // 从URL参数获取room和seat信息
                    const urlParams = new URLSearchParams(window.location.search);
                    const seatId = urlParams.get('seatId');
                    
                    // 获取座位详情
                    if (seatId) {
                        axios.get(`/api/studyroom/seat/${seatId}`).then(res => {
                            if (res.data.code === 200) {
                                seat.value = res.data.data;
                                // 获取自习室信息
                                axios.get(`/api/studyroom/${seat.value.roomId}`).then(roomRes => {
                                    if (roomRes.data.code === 200) {
                                        room.value = roomRes.data.data;
                                    }
                                });
                            }
                        });
                    }
                    
                    // 设置默认日期为今天
                    const today = new Date();
                    form.date = today.toISOString().split('T')[0];
                    onDateChange();
                });

                return { 
                    currentUser, room, seat, form, submitting, occupiedTimes,
                    minStartTime, minEndTime,
                    disabledDate, goBack, submitReserve, onDateChange, onStartTimeChange, logout, UserFilled 
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
