<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 高校自习室智能管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
        .admin-container { min-height: 100vh; }
        .admin-header {
            background: #001529; color: white; padding: 0 24px;
            height: 64px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 20px; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .admin-layout { display: flex; min-height: calc(100vh - 64px); }
        .admin-sidebar {
            width: 200px; background: #001529; min-height: calc(100vh - 64px);
        }
        .sidebar-menu { list-style: none; padding: 16px 0; }
        .sidebar-menu li {
            padding: 12px 24px; color: rgba(255,255,255,0.65);
            cursor: pointer; transition: all 0.3s;
        }
        .sidebar-menu li:hover, .sidebar-menu li.active {
            color: white; background: #1890ff;
        }
        .admin-main { flex: 1; padding: 24px; }
        .page-title { font-size: 24px; margin-bottom: 24px; color: #1f2f3d; }
        .content-card {
            background: white; padding: 24px; border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .search-bar { margin-bottom: 20px; display: flex; gap: 12px; }
        .pagination { margin-top: 20px; display: flex; justify-content: flex-end; }
    </style>
</head>
<body>
    <div id="app">
        <div class="admin-container">
            <header class="admin-header">
                <div class="logo">高校自习室智能管理系统</div>
                <div class="user-info">
                    <span th:text="${session.user?.realName ?: session.user?.username}">管理员</span>
                    <el-button type="danger" size="small" @click="logout">退出</el-button>
                </div>
            </header>
            
            <div class="admin-layout">
                <aside class="admin-sidebar">
                    <ul class="sidebar-menu">
                        <li @click="goTo('/sysadmin/dashboard')">控制台</li>
                        <li class="active">用户管理</li>
                        <li @click="goTo('/sysadmin/studyroom')">自习室管理</li>
                        <li @click="goTo('/sysadmin/reservation')">预约管理</li>
                        <li @click="goTo('/sysadmin/notice')">公告管理</li>
                        <li @click="goTo('/sysadmin/forum')">论坛管理</li>
                        <li @click="goTo('/sysadmin/statistics')">数据统计</li>
                    </ul>
                </aside>
                
                <main class="admin-main">
                    <h1 class="page-title">用户管理</h1>
                    
                    <div class="content-card">
                        <div class="search-bar">
                            <el-input v-model="searchForm.username" placeholder="用户名" style="width: 200px;" clearable></el-input>
                            <el-input v-model="searchForm.realName" placeholder="真实姓名" style="width: 200px;" clearable></el-input>
                            <el-select v-model="searchForm.userType" placeholder="用户类型" style="width: 150px;" clearable>
                                <el-option label="普通用户" :value="1"></el-option>
                                <el-option label="自习室管理员" :value="2"></el-option>
                                <el-option label="系统管理员" :value="3"></el-option>
                            </el-select>
                            <el-button type="primary" @click="handleSearch">查询</el-button>
                            <el-button @click="resetSearch">重置</el-button>
                            <el-button type="success" @click="handleAdd">新增用户</el-button>
                        </div>
                        
                        <el-table :data="userList" v-loading="loading" border>
                            <el-table-column prop="id" label="ID" width="60"></el-table-column>
                            <el-table-column prop="username" label="用户名" width="120"></el-table-column>
                            <el-table-column prop="realName" label="真实姓名" width="120"></el-table-column>
                            <el-table-column prop="phone" label="手机号" width="130"></el-table-column>
                            <el-table-column prop="email" label="邮箱" width="180"></el-table-column>
                            <el-table-column prop="userType" label="用户类型" width="120">
                                <template #default="scope">
                                    <el-tag v-if="scope.row.userType === 1" type="info">普通用户</el-tag>
                                    <el-tag v-else-if="scope.row.userType === 2" type="warning">自习室管理员</el-tag>
                                    <el-tag v-else-if="scope.row.userType === 3" type="danger">系统管理员</el-tag>
                                </template>
                            </el-table-column>
                            <el-table-column prop="status" label="状态" width="80">
                                <template #default="scope">
                                    <el-switch v-model="scope.row.status" :active-value="1" :inactive-value="0" @change="handleStatusChange(scope.row)"></el-switch>
                                </template>
                            </el-table-column>
                            <el-table-column prop="lastLoginTime" label="最后登录" width="160"></el-table-column>
                            <el-table-column label="操作" width="180" fixed="right">
                                <template #default="scope">
                                    <el-button type="primary" size="small" @click="handleEdit(scope.row)">编辑</el-button>
                                    <el-button type="danger" size="small" @click="handleDelete(scope.row)">删除</el-button>
                                </template>
                            </el-table-column>
                        </el-table>
                        
                        <div class="pagination">
                            <el-pagination
                                v-model:current-page="page.current"
                                v-model:page-size="page.size"
                                :total="page.total"
                                :page-sizes="[10, 20, 50, 100]"
                                layout="total, sizes, prev, pager, next"
                                @size-change="handleSizeChange"
                                @current-change="handleCurrentChange">
                            </el-pagination>
                        </div>
                    </div>
                </main>
            </div>
        </div>
        
        <!-- 新增/编辑对话框 -->
        <el-dialog v-model="dialogVisible" :title="dialogTitle" width="500px">
            <el-form :model="form" :rules="rules" ref="formRef" label-width="100px">
                <el-form-item label="用户名" prop="username">
                    <el-input v-model="form.username" :disabled="isEdit"></el-input>
                </el-form-item>
                <el-form-item label="密码" prop="password" v-if="!isEdit">
                    <el-input v-model="form.password" type="password" placeholder="默认密码: admin"></el-input>
                </el-form-item>
                <el-form-item label="真实姓名" prop="realName">
                    <el-input v-model="form.realName"></el-input>
                </el-form-item>
                <el-form-item label="手机号" prop="phone">
                    <el-input v-model="form.phone"></el-input>
                </el-form-item>
                <el-form-item label="邮箱" prop="email">
                    <el-input v-model="form.email"></el-input>
                </el-form-item>
                <el-form-item label="用户类型" prop="userType">
                    <el-select v-model="form.userType" style="width: 100%;">
                        <el-option label="普通用户" :value="1"></el-option>
                        <el-option label="自习室管理员" :value="2"></el-option>
                        <el-option label="系统管理员" :value="3"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item label="状态" prop="status">
                    <el-radio-group v-model="form.status">
                        <el-radio :label="1">启用</el-radio>
                        <el-radio :label="0">禁用</el-radio>
                    </el-radio-group>
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="dialogVisible = false">取消</el-button>
                <el-button type="primary" @click="handleSubmit">确定</el-button>
            </template>
        </el-dialog>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        const { ElMessage, ElMessageBox } = ElementPlus;

        createApp({
            setup() {
                const loading = ref(false);
                const userList = ref([]);
                const dialogVisible = ref(false);
                const dialogTitle = ref('');
                const isEdit = ref(false);
                const formRef = ref(null);
                
                const searchForm = reactive({
                    username: '',
                    realName: '',
                    userType: null
                });
                
                const page = reactive({
                    current: 1,
                    size: 10,
                    total: 0
                });
                
                const form = reactive({
                    id: null,
                    username: '',
                    password: '',
                    realName: '',
                    phone: '',
                    email: '',
                    userType: 1,
                    status: 1
                });
                
                const rules = {
                    username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                    realName: [{ required: true, message: '请输入真实姓名', trigger: 'blur' }],
                    userType: [{ required: true, message: '请选择用户类型', trigger: 'change' }]
                };
                
                const fetchUserList = async () => {
                    loading.value = true;
                    try {
                        const params = {
                            page: page.current,
                            size: page.size,
                            ...searchForm
                        };
                        const response = await axios.get('/sysadmin/user/list', { params });
                        if (response.data.code === 200) {
                            userList.value = response.data.data.records;
                            page.total = response.data.data.total;
                        }
                    } catch (error) {
                        console.error('获取用户列表失败:', error);
                        ElMessage.error('获取用户列表失败');
                    } finally {
                        loading.value = false;
                    }
                };
                
                const handleSearch = () => {
                    page.current = 1;
                    fetchUserList();
                };
                
                const resetSearch = () => {
                    searchForm.username = '';
                    searchForm.realName = '';
                    searchForm.userType = null;
                    handleSearch();
                };
                
                const handleAdd = () => {
                    isEdit.value = false;
                    dialogTitle.value = '新增用户';
                    Object.assign(form, {
                        id: null,
                        username: '',
                        password: '',
                        realName: '',
                        phone: '',
                        email: '',
                        userType: 1,
                        status: 1
                    });
                    dialogVisible.value = true;
                };
                
                const handleEdit = (row) => {
                    isEdit.value = true;
                    dialogTitle.value = '编辑用户';
                    Object.assign(form, { ...row });
                    dialogVisible.value = true;
                };
                
                const handleDelete = async (row) => {
                    try {
                        await ElMessageBox.confirm('确定要删除该用户吗？', '提示', { type: 'warning' });
                        const response = await axios.delete(`/sysadmin/user/${row.id}`);
                        if (response.data.code === 200) {
                            ElMessage.success('删除成功');
                            fetchUserList();
                        }
                    } catch (error) {
                        if (error !== 'cancel') {
                            console.error('删除失败:', error);
                            ElMessage.error('删除失败');
                        }
                    }
                };
                
                const handleStatusChange = async (row) => {
                    try {
                        const response = await axios.put(`/sysadmin/user/${row.id}/status`, { status: row.status });
                        if (response.data.code === 200) {
                            ElMessage.success('状态更新成功');
                        }
                    } catch (error) {
                        console.error('状态更新失败:', error);
                        ElMessage.error('状态更新失败');
                        row.status = row.status === 1 ? 0 : 1;
                    }
                };
                
                const handleSubmit = async () => {
                    formRef.value.validate(async (valid) => {
                        if (valid) {
                            try {
                                const url = isEdit.value ? `/sysadmin/user/${form.id}` : '/sysadmin/user';
                                const method = isEdit.value ? 'put' : 'post';
                                const response = await axios[method](url, form);
                                if (response.data.code === 200) {
                                    ElMessage.success(isEdit.value ? '编辑成功' : '新增成功');
                                    dialogVisible.value = false;
                                    fetchUserList();
                                }
                            } catch (error) {
                                console.error('保存失败:', error);
                                ElMessage.error('保存失败');
                            }
                        }
                    });
                };
                
                const handleSizeChange = (val) => {
                    page.size = val;
                    fetchUserList();
                };
                
                const handleCurrentChange = (val) => {
                    page.current = val;
                    fetchUserList();
                };
                
                const goTo = (path) => {
                    window.location.href = path;
                };
                
                const logout = async () => {
                    try {
                        await axios.post('/auth/logout');
                        window.location.href = '/login';
                    } catch (error) {
                        console.error('退出失败:', error);
                    }
                };
                
                onMounted(() => {
                    fetchUserList();
                });
                
                return {
                    loading,
                    userList,
                    searchForm,
                    page,
                    dialogVisible,
                    dialogTitle,
                    isEdit,
                    form,
                    formRef,
                    rules,
                    handleSearch,
                    resetSearch,
                    handleAdd,
                    handleEdit,
                    handleDelete,
                    handleStatusChange,
                    handleSubmit,
                    handleSizeChange,
                    handleCurrentChange,
                    goTo,
                    logout
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
