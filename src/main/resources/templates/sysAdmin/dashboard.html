<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理员后台 - 高校自习室智能管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
        }
        .admin-container {
            min-height: 100vh;
        }
        .admin-header {
            background: #001529;
            color: white;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 20px;
            font-weight: 600;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .admin-layout {
            display: flex;
            min-height: calc(100vh - 64px);
        }
        .admin-sidebar {
            width: 200px;
            background: #001529;
            min-height: calc(100vh - 64px);
        }
        .sidebar-menu {
            list-style: none;
            padding: 16px 0;
        }
        .sidebar-menu li {
            padding: 12px 24px;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            transition: all 0.3s;
        }
        .sidebar-menu li:hover,
        .sidebar-menu li.active {
            color: white;
            background: #1890ff;
        }
        .admin-main {
            flex: 1;
            padding: 24px;
        }
        .page-title {
            font-size: 24px;
            margin-bottom: 24px;
            color: #1f2f3d;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .stat-title {
            color: #909399;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #303133;
        }
        .content-card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="admin-container">
            <header class="admin-header">
                <div class="logo">高校自习室智能管理系统</div>
                <div class="user-info">
                    <span th:text="${session.user?.realName ?: session.user?.username}">管理员</span>
                    <el-button type="danger" size="small" @click="logout">退出</el-button>
                </div>
            </header>
            
            <div class="admin-layout">
                <aside class="admin-sidebar">
                    <ul class="sidebar-menu">
                        <li class="active" @click="goTo('/sysadmin/dashboard')">控制台</li>
                        <li @click="goTo('/sysadmin/user')">用户管理</li>
                        <li @click="goTo('/sysadmin/studyroom')">自习室管理</li>
                        <li @click="goTo('/sysadmin/reservation')">预约管理</li>
                        <li @click="goTo('/sysadmin/notice')">公告管理</li>
                        <li @click="goTo('/sysadmin/forum')">论坛管理</li>
                        <li @click="goTo('/sysadmin/statistics')">数据统计</li>
                    </ul>
                </aside>
                
                <main class="admin-main">
                    <h1 class="page-title">系统管理员控制台</h1>
                    
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-title">总用户数</div>
                            <div class="stat-value">{{ stats.userCount }}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-title">本周新增注册</div>
                            <div class="stat-value">{{ stats.weekNewUserCount }}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-title">待处理预约</div>
                            <div class="stat-value">{{ stats.pendingReservationCount }}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-title">本周签到率</div>
                            <div class="stat-value">{{ stats.weekCheckInRate }}%</div>
                        </div>
                    </div>
                    
                    <div class="content-card" style="margin-bottom: 24px;">
                        <h3 style="margin-bottom: 16px;">欢迎使用系统管理员后台</h3>
                        <p style="color: #606266; line-height: 1.8;">
                            这里是系统管理员控制台，您可以管理用户、自习室、预约等信息。
                        </p>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                        <div class="content-card">
                            <h4 style="margin-bottom: 16px;">最近注册用户</h4>
                            <el-table :data="recentUsers" size="small">
                                <el-table-column prop="username" label="用户名"></el-table-column>
                                <el-table-column prop="realName" label="姓名"></el-table-column>
                                <el-table-column prop="userType" label="类型">
                                    <template #default="scope">
                                        <el-tag v-if="scope.row.userType === 1" size="small">普通用户</el-tag>
                                        <el-tag v-else-if="scope.row.userType === 2" type="warning" size="small">管理员</el-tag>
                                        <el-tag v-else-if="scope.row.userType === 3" type="danger" size="small">系统管理员</el-tag>
                                    </template>
                                </el-table-column>
                                <el-table-column prop="createTime" label="注册时间" width="160"></el-table-column>
                            </el-table>
                        </div>
                        <div class="content-card">
                            <h4 style="margin-bottom: 16px;">今日预约情况</h4>
                            <el-table :data="todayReservations" size="small">
                                <el-table-column prop="userName" label="用户"></el-table-column>
                                <el-table-column prop="roomName" label="自习室"></el-table-column>
                                <el-table-column prop="seatNumber" label="座位"></el-table-column>
                                <el-table-column prop="status" label="状态">
                                    <template #default="scope">
                                        <el-tag v-if="scope.row.status === 0" type="info" size="small">待签到</el-tag>
                                        <el-tag v-else-if="scope.row.status === 1" type="success" size="small">已签到</el-tag>
                                        <el-tag v-else-if="scope.row.status === 2" type="primary" size="small">已完成</el-tag>
                                        <el-tag v-else type="danger" size="small">已取消</el-tag>
                                    </template>
                                </el-table-column>
                            </el-table>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        const { ElMessage } = ElementPlus;

        createApp({
            setup() {
                const stats = reactive({
                    userCount: 0,
                    weekNewUserCount: 0,
                    pendingReservationCount: 0,
                    weekCheckInRate: 0
                });
                const recentUsers = ref([]);
                const todayReservations = ref([]);

                const fetchStats = async () => {
                    try {
                        const res = await axios.get('/sysadmin/dashboard/stats');
                        if (res.data.code === 200) {
                            Object.assign(stats, res.data.data);
                        }
                    } catch (error) {
                        console.error('获取统计数据失败:', error);
                    }
                };

                const fetchRecentUsers = async () => {
                    try {
                        const res = await axios.get('/sysadmin/dashboard/recent-users');
                        if (res.data.code === 200) {
                            recentUsers.value = res.data.data;
                        }
                    } catch (error) {
                        console.error('获取最近用户失败:', error);
                    }
                };

                const fetchTodayReservations = async () => {
                    try {
                        const res = await axios.get('/sysadmin/dashboard/today-reservations');
                        if (res.data.code === 200) {
                            todayReservations.value = res.data.data;
                        }
                    } catch (error) {
                        console.error('获取今日预约失败:', error);
                    }
                };

                const logout = async () => {
                    try {
                        await axios.post('/auth/logout');
                        window.location.href = '/login';
                    } catch (error) {
                        console.error('退出失败:', error);
                    }
                };

                const goTo = (path) => {
                    window.location.href = path;
                };

                onMounted(() => {
                    fetchStats();
                    fetchRecentUsers();
                    fetchTodayReservations();
                });

                return {
                    stats,
                    recentUsers,
                    todayReservations,
                    logout,
                    goTo
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
