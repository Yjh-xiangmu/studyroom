<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自习室列表 - 高校自习室智能管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .navbar { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 0 48px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .navbar-brand { font-size: 22px; font-weight: 700; color: #0068DD; text-decoration: none; }
        .nav-menu { display: flex; gap: 32px; }
        .nav-item { color: #333; text-decoration: none; font-weight: 500; line-height: 64px; }
        .nav-item:hover, .nav-item.active { color: #0068DD; }
        .main-content { padding-top: 64px; min-height: 100vh; }
        .search-section { background: #fff; padding: 24px 48px; border-bottom: 1px solid #e8e8e8; }
        .search-form { display: flex; gap: 16px; align-items: center; max-width: 1200px; margin: 0 auto; }
        .room-list { max-width: 1200px; margin: 24px auto; padding: 0 48px; }
        .room-card { background: #fff; border-radius: 8px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; }
        .room-image { width: 280px; height: 200px; object-fit: cover; }
        .room-info { flex: 1; padding: 20px; }
        .room-title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .room-meta { display: flex; gap: 24px; color: #666; margin-bottom: 12px; }
        .room-meta span { display: flex; align-items: center; gap: 6px; }
        .room-status { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 12px; }
        .status-open { background: #f6ffed; color: #52c41a; }
        .status-full { background: #fff1f0; color: #ff4d4f; }
        .status-closed { background: #f5f5f5; color: #999; }
        .room-actions { display: flex; gap: 12px; margin-top: 16px; }
        .pagination { display: flex; justify-content: center; padding: 24px; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <a href="/" class="navbar-brand">自习室管理系统</a>
            <div class="nav-menu">
                <a href="/" class="nav-item">首页</a>
                <a href="/studyroom" class="nav-item active">自习室</a>
                <a href="/reservation" class="nav-item">我的预约</a>
                <a href="/checkin" class="nav-item">签到打卡</a>
                <a href="/forum" class="nav-item">社区论坛</a>
            </div>
            <div class="nav-user">
                <el-dropdown v-if="currentUser">
                    <span class="el-dropdown-link">
                        <el-avatar :size="32" :icon="UserFilled"></el-avatar>
                        <span style="margin-left: 8px;">{{currentUser.realName || currentUser.username}}</span>
                    </span>
                    <template #dropdown>
                        <el-dropdown-menu>
                            <el-dropdown-item><a href="/profile" style="text-decoration: none; color: inherit;">个人中心</a></el-dropdown-item>
                            <el-dropdown-item divided @click="logout">退出登录</el-dropdown-item>
                        </el-dropdown-menu>
                    </template>
                </el-dropdown>
                <a v-else href="/login" style="color: #333; text-decoration: none;">登录</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="search-section">
                <div class="search-form">
                    <el-input v-model="searchForm.name" placeholder="自习室名称" style="width: 200px;" clearable></el-input>
                    <el-select v-model="searchForm.building" placeholder="所在楼栋" style="width: 150px;" clearable>
                        <el-option label="图书馆" value="图书馆"></el-option>
                        <el-option label="教学楼A" value="教学楼A"></el-option>
                        <el-option label="教学楼B" value="教学楼B"></el-option>
                    </el-select>
                    <el-select v-model="searchForm.floor" placeholder="楼层" style="width: 120px;" clearable>
                        <el-option v-for="i in 5" :key="i" :label="i + '层'" :value="i"></el-option>
                    </el-select>
                    <el-button type="primary" @click="handleSearch">查询</el-button>
                    <el-button @click="resetSearch">重置</el-button>
                </div>
            </div>

            <div class="room-list">
                <div v-if="loading" style="text-align: center; padding: 40px;">
                    <el-icon :size="32" class="is-loading"><Loading /></el-icon>
                </div>
                <div v-else-if="roomList.length === 0" style="text-align: center; padding: 60px; color: #999;">
                    暂无自习室数据
                </div>
                <div v-else>
                    <div class="room-card" v-for="room in roomList" :key="room.id">
                        <img :src="room.imageUrl || getRoomImage(room.id)" class="room-image" alt="自习室">
                        <div class="room-info">
                            <div class="room-title">{{room.name}}</div>
                            <div class="room-meta">
                                <span><el-icon><Location /></el-icon>{{room.building}} {{room.floor}}层</span>
                                <span><el-icon><User /></el-icon>容量: {{room.capacity}}人</span>
                                <span><el-icon><Clock /></el-icon>{{room.openTime}} - {{room.closeTime}}</span>
                            </div>
                            <div class="room-status" :class="getStatusClass(room)">{{getStatusText(room)}}</div>
                            <div style="color: #666; font-size: 14px;">{{room.description}}</div>
                            <div class="room-actions">
                                <el-button type="primary" @click="viewDetail(room)">查看详情</el-button>
                            </div>
                        </div>
                    </div>
                    <div class="pagination">
                        <el-pagination v-model:current-page="page.current" v-model:page-size="page.size" :total="page.total" :page-sizes="[5, 10, 20]" layout="total, sizes, prev, pager, next" @size-change="handleSizeChange" @current-change="handleCurrentChange"></el-pagination>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, onMounted } = Vue;
        const { ElMessage } = ElementPlus;
        const { UserFilled, Location, User, Clock, Loading } = ElementPlusIconsVue;

        createApp({
            setup() {
                const currentUser = ref(null);
                const loading = ref(false);
                const roomList = ref([]);
                const searchForm = reactive({ name: '', building: '', floor: '' });
                const page = reactive({ current: 1, size: 10, total: 0 });

                const fetchUser = async () => {
                    try {
                        const res = await axios.get('/api/user/info');
                        if (res.data.code === 200) currentUser.value = res.data.data;
                    } catch (e) {}
                };

                const fetchRooms = async () => {
                    loading.value = true;
                    try {
                        const params = { page: page.current, size: page.size, ...searchForm };
                        const res = await axios.get('/api/studyroom/list', { params });
                        if (res.data.code === 200) {
                            roomList.value = res.data.data.records;
                            page.total = res.data.data.total;
                        }
                    } catch (e) { ElMessage.error('获取自习室列表失败'); }
                    finally { loading.value = false; }
                };

                const getRoomImage = (id) => `/images/${(id % 9) || 9}.png`;
                const getStatusClass = (room) => {
                    if (room.status === 0) return 'status-closed';
                    if (room.capacity > 0 && room.usedSeats >= room.capacity) return 'status-full';
                    return 'status-open';
                };
                const getStatusText = (room) => {
                    if (room.status === 0) return '暂停开放';
                    if (room.capacity > 0 && room.usedSeats >= room.capacity) return '已满座';
                    return '开放中';
                };
                const handleSearch = () => { page.current = 1; fetchRooms(); };
                const resetSearch = () => { searchForm.name = ''; searchForm.building = ''; searchForm.floor = ''; handleSearch(); };
                const handleSizeChange = (val) => { page.size = val; fetchRooms(); };
                const handleCurrentChange = (val) => { page.current = val; fetchRooms(); };
                const viewDetail = (room) => { window.location.href = `/studyroom/${room.id}`; };
                const reserve = (room) => { window.location.href = `/studyroom/${room.id}/reserve`; };
                const logout = async () => { try { await axios.post('/auth/logout'); window.location.href = '/login'; } catch (e) {} };

                onMounted(() => { fetchUser(); fetchRooms(); });

                return { currentUser, loading, roomList, searchForm, page, getRoomImage, getStatusClass, getStatusText, handleSearch, resetSearch, handleSizeChange, handleCurrentChange, viewDetail, reserve, logout, UserFilled, Location, User, Clock, Loading };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
