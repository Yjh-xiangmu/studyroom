<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - 高校自习室智能管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f7fa; }
        .navbar { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 0 48px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .navbar-brand { font-size: 22px; font-weight: 700; color: #0068DD; text-decoration: none; }
        .nav-menu { display: flex; gap: 32px; }
        .nav-item { color: #333; text-decoration: none; font-weight: 500; line-height: 64px; }
        .nav-item:hover, .nav-item.active { color: #0068DD; }
        .main-content { padding-top: 64px; min-height: 100vh; padding-bottom: 40px; }
        .detail-container { max-width: 1000px; margin: 24px auto; padding: 0 24px; }
        .post-detail { background: #fff; border-radius: 8px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .post-author { display: flex; align-items: center; gap: 12px; }
        .post-title { font-size: 24px; font-weight: 600; margin-bottom: 16px; }
        .post-content { color: #333; line-height: 1.8; font-size: 16px; margin-bottom: 24px; }
        .post-footer { display: flex; gap: 24px; color: #999; font-size: 14px; }
        .reply-section { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .reply-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .reply-item { padding: 16px 0; border-bottom: 1px solid #eee; }
        .reply-item:last-child { border-bottom: none; }
        .reply-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .reply-author { font-weight: 500; }
        .reply-time { color: #999; font-size: 14px; }
        .reply-content { color: #666; line-height: 1.6; }
        .reply-form { margin-top: 24px; padding-top: 24px; border-top: 1px solid #eee; }
        .back-btn { margin-bottom: 16px; }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <a href="/" class="navbar-brand">自习室管理系统</a>
            <div class="nav-menu">
                <a href="/" class="nav-item">首页</a>
                <a href="/studyroom" class="nav-item">自习室</a>
                <a href="/reservation" class="nav-item">我的预约</a>
                <a href="/checkin" class="nav-item">签到打卡</a>
                <a href="/forum" class="nav-item active">社区论坛</a>
            </div>
            <div class="nav-user">
                <el-dropdown v-if="currentUser">
                    <span class="el-dropdown-link">
                        <el-avatar :size="32" :icon="UserFilled"></el-avatar>
                        <span style="margin-left: 8px;">{{currentUser.realName || currentUser.username}}</span>
                    </span>
                    <template #dropdown>
                        <el-dropdown-menu>
                            <el-dropdown-item><a href="/profile" style="text-decoration: none; color: inherit;">个人中心</a></el-dropdown-item>
                            <el-dropdown-item divided @click="logout">退出登录</el-dropdown-item>
                        </el-dropdown-menu>
                    </template>
                </el-dropdown>
                <a v-else href="/login" style="color: #333; text-decoration: none;">登录</a>
            </div>
        </nav>

        <div class="main-content">
            <div class="detail-container">
                <el-button class="back-btn" @click="goBack" :icon="ArrowLeft">返回列表</el-button>
                
                <div v-if="loading" style="text-align: center; padding: 60px;">
                    <el-icon :size="32" class="is-loading"><Loading /></el-icon>
                </div>
                <template v-else-if="post">
                    <div class="post-detail">
                        <div class="post-header">
                            <div class="post-author">
                                <el-avatar :size="40">{{post.authorName?.charAt(0)}}</el-avatar>
                                <div>
                                    <div style="font-weight: 500; display: flex; align-items: center; gap: 6px;">
                                    {{post.authorName}}
                                    <el-tag v-if="post.authorType === 3" type="danger" size="small">系统管理员</el-tag>
                                    <el-tag v-else-if="post.authorType === 2" type="warning" size="small">自习室管理员</el-tag>
                                </div>
                                    <div style="color: #999; font-size: 14px;">{{post.createTime}}</div>
                                </div>
                            </div>
                            <el-tag>{{getCategoryName(post.category)}}</el-tag>
                        </div>
                        <div class="post-title">{{post.title}}</div>
                        <div class="post-content">{{post.content}}</div>
                        <div class="post-footer">
                            <span><el-icon><View /></el-icon> {{post.viewCount || 0}} 浏览</span>
                            <span><el-icon><ChatDotRound /></el-icon> {{post.replyCount || 0}} 回复</span>
                            <span><el-icon><Pointer /></el-icon> {{post.likeCount || 0}} 点赞</span>
                        </div>
                    </div>

                    <div class="reply-section">
                        <div class="reply-title">评论回复 ({{replies.length}})</div>
                        <div v-if="replies.length === 0" style="text-align: center; color: #999; padding: 40px;">
                            暂无回复，快来抢沙发吧！
                        </div>
                        <div v-else>
                            <div class="reply-item" v-for="reply in replies" :key="reply.id">
                                <div class="reply-header">
                                    <span class="reply-author">{{reply.authorName || '匿名用户'}}</span>
                                    <span class="reply-time">{{reply.createTime}}</span>
                                </div>
                                <div class="reply-content">{{reply.content}}</div>
                            </div>
                        </div>
                        
                        <div class="reply-form">
                            <el-input v-model="replyContent" type="textarea" :rows="3" placeholder="写下你的评论..."></el-input>
                            <el-button type="primary" style="margin-top: 12px;" @click="submitReply" :loading="submitting">发表评论</el-button>
                        </div>
                    </div>
                </template>
                <div v-else style="text-align: center; padding: 60px; color: #999;">
                    <el-icon :size="64" color="#ddd"><Document /></el-icon>
                    <p style="margin-top: 16px;">帖子不存在或已被删除</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const { ElMessage } = ElementPlus;
        const { UserFilled, Loading, ArrowLeft, View, ChatDotRound, Pointer, Document } = ElementPlusIconsVue;

        const app = createApp({
            setup() {
                const currentUser = ref(null);
                const loading = ref(false);
                const post = ref(null);
                const replies = ref([]);
                const replyContent = ref('');
                const submitting = ref(false);
                
                // 从URL获取帖子ID
                const postId = window.location.pathname.split('/').pop();

                const fetchUser = async () => {
                    try {
                        const res = await axios.get('/api/user/info');
                        if (res.data.code === 200) currentUser.value = res.data.data;
                    } catch (e) {}
                };

                const fetchPostDetail = async () => {
                    loading.value = true;
                    try {
                        const res = await axios.get(`/api/forum/post/${postId}`);
                        if (res.data.code === 200) {
                            post.value = res.data.data.post;
                            replies.value = res.data.data.replies || [];
                        }
                    } catch (e) { 
                        ElMessage.error('获取帖子详情失败');
                    }
                    finally { loading.value = false; }
                };

                const getCategoryName = (category) => {
                    const map = { feedback: '意见反馈', report: '故障上报', complaint: '占座反馈', discussion: '学习交流' };
                    return map[category] || '其他';
                };

                const goBack = () => { window.location.href = '/forum'; };

                const submitReply = async () => {
                    if (!replyContent.value.trim()) {
                        ElMessage.warning('请输入评论内容');
                        return;
                    }
                    submitting.value = true;
                    try {
                        const res = await axios.post(`/api/forum/post/${postId}/reply`, { content: replyContent.value });
                        if (res.data.code === 200) {
                            ElMessage.success('评论成功');
                            replyContent.value = '';
                            fetchPostDetail();
                        } else ElMessage.error(res.data.message || '评论失败');
                    } catch (e) { ElMessage.error('评论失败'); }
                    finally { submitting.value = false; }
                };

                const logout = async () => { try { await axios.post('/auth/logout'); window.location.href = '/login'; } catch (e) {} };

                onMounted(() => { fetchUser(); fetchPostDetail(); });

                return { currentUser, loading, post, replies, replyContent, submitting, getCategoryName, goBack, submitReply, logout, UserFilled, Loading, ArrowLeft, View, ChatDotRound, Pointer, Document };
            }
        });
        
        app.use(ElementPlus);
        app.component('View', View);
        app.component('ChatDotRound', ChatDotRound);
        app.component('Pointer', Pointer);
        app.mount('#app');
    </script>
</body>
</html>
